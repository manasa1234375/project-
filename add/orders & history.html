        function renderOrders(){

function renderHistory(){
orderHistory.innerHTML=""
history.forEach((o,i)=>{
let items=o.items.map(x=>x.n).join(", ")
orderHistory.innerHTML+=`<p>
Order ${i+1}: ${items} | Payment: ${o.payment} | Time: ${o.time}
</p>`
})
}
